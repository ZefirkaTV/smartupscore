<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Залишилось уроків</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; padding: 10px; display: flex; justify-content: center; }
    
    .container { 
      background: white; 
      padding: 20px 10px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
      width: 100%; 
      max-width: 1000px; 
      max-height: 90vh; /* Обмежуємо висоту контейнера для внутрішнього скролу */
      display: flex;
      flex-direction: column;
    }

    h1 { text-align: center; color: #1e293b; margin-bottom: 5px; font-weight: 800; font-size: 22px; }
    .status { text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 15px; }

    /* Контейнер для скролу */
    .table-wrapper {
      width: 100%;
      overflow: auto; /* Дозволяємо і вертикальний, і горизонтальний скрол */
      border-radius: 12px;
      border: 1px solid #f1f5f9;
    }

    table { 
      width: 100%; 
      border-collapse: separate; 
      border-spacing: 0;
    }

    th, td { 
      padding: 12px 10px; 
      font-size: 14px; 
      text-align: center; 
      border-bottom: 1px solid #f1f5f9;
      white-space: nowrap;
    }

    /* ФІКСАЦІЯ ЗАГОЛОВКІВ (ВЕРХ) */
    thead th {
      position: sticky;
      top: 0;
      z-index: 10; /* Вище за все інше */
      background: #6366f1;
      color: white;
      font-weight: 600;
    }

    /* ФІКСАЦІЯ ПЕРШОЇ КОЛОНКИ (ЛІВО) */
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      z-index: 5;
      background: #fff;
      text-align: left;
      min-width: 130px;
      border-right: 1px solid #f1f5f9;
    }

    /* Клітинка на перетині (Учень) - має бути найвищою */
    thead th:first-child {
      z-index: 15;
      background: #6366f1;
    }

    tr:hover td { background: #f8fafc; }
    tr:hover td:first-child { background: #f8fafc; }

    /* Бейджі */
    .pos, .neg { 
      display: inline-block;
      min-width: 28px;
      padding: 4px 8px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
    }
    .pos { color: #10b981; background: #ecfdf5; }
    .neg { color: #ef4444; background: #fef2f2; }

    @media (min-width: 768px) {
      body { padding: 30px; }
      .container { padding: 30px; max-height: 95vh; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📊 Залишилось уроків</h1>
    <div id="updateTime" class="status">Оновлення...</div>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Учень</th>
            <th>Прогр.</th>
            <th>Робот.</th>
            <th>Малюв.</th>
            <th>Хіп-хоп</th>
            <th>Англ.</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

<script>
const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXuEirbPdZ_qBQKpmktbVO_TBvc33hCbiYf3oen1ceR2zj-vnHUetel791wpWRtPlQIGxgykuBsypf/pub?gid=1247776630&single=true&output=csv';

async function fetchData() {
  try {
    const response = await fetch(url + '&t=' + Date.now(), { cache: "no-store" });
    const csv = await response.text();
    const rows = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim()));

    const tbody = document.getElementById('tableBody');
    let html = '';

    const getBadge = (val) => {
        const num = parseInt(val) || 0;
        return `<span class="${num < 0 ? 'neg' : 'pos'}">${val || '0'}</span>`;
    };

    for (let i = 2; i < rows.length; i++) {
      const name = rows[i][0];  
      if (name && name.length > 1) {
        html += `
          <tr>
            <td>${name}</td>
            <td>${getBadge(rows[i][9])}</td>
            <td>${getBadge(rows[i][10])}</td>
            <td>${getBadge(rows[i][11])}</td>
            <td>${getBadge(rows[i][12])}</td>
            <td>${getBadge(rows[i][13])}</td>
          </tr>`;
      }
    }
    tbody.innerHTML = html;
    document.getElementById('updateTime').innerText = 'Останнє оновлення: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('updateTime').innerText = "Помилка зв'язку";
  }
}

fetchData();
setInterval(fetchData, 30000);
</script>

</body>
</html>
