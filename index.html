<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Журнал відвідуваності</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 850px; }
    h1 { text-align: center; color: #1e293b; margin-bottom: 5px; font-weight: 800; }
    .status { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
    th { background: #6366f1; color: white; padding: 15px; text-align: left; font-size: 18px; }
    td { padding: 14px 15px; border-bottom: 1px solid #f1f5f9; font-size: 15px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: #f8fafc; }
    .pos { color: #10b981; font-weight: 700; background: #ecfdf5; padding: 4px 10px; border-radius: 8px; }
    .neg { color: #ef4444; font-weight: 700; background: #fef2f2; padding: 4px 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 Відвідуваність учнів</h1>
    <div id="updateTime" class="status">Синхронізація з сервером...</div>
    <table>
      <thead>
        <tr>
          <th>Учень</th>
          <th>Програмування</th>
          <th>Робототехніка</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

<script>
const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXuEirbPdZ_qBQKpmktbVO_TBvc33hCbiYf3oen1ceR2zj-vnHUetel791wpWRtPlQIGxgykuBsypf/pub?gid=1247776630&single=true&output=csv';

async function fetchData() {
  try {
    const response = await fetch(url + '&cacheBust=' + Date.now());
    const csv = await response.text();

    const rows = csv.split('\n').map(r =>
      r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
       .map(c => c.replace(/^"|"$/g, '').trim())
    );

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    for (let i = 2; i < rows.length; i++) {

      const name = rows[i][0];  
      const pVal = rows[i][9] || '0';   // П
      const rVal = rows[i][10] || '0';   // Р

      if (name && name.length > 1) {

        const pClass = parseInt(pVal) < 0 ? 'neg' : 'pos';
        const rClass = parseInt(rVal) < 0 ? 'neg' : 'pos';

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${name}</td>
          <td><span class="${pClass}">${pVal}</span></td>
          <td><span class="${rClass}">${rVal}</span></td>
        `;

        tbody.appendChild(tr);
      }
    }

    document.getElementById('updateTime').innerText =
      'Останнє оновлення: ' + new Date().toLocaleTimeString();

  } catch (e) {
    document.getElementById('updateTime').innerText =
      "Помилка зв'язку з Google Sheets";
    console.error(e);
  }
}

const response = await fetch(
  url + '&t=' + Date.now(),
  { cache: "no-store" }
);

fetchData();
setInterval(fetchData, 60000);
</script>

</body>
</html>
