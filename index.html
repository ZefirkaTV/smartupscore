<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Журнал відвідуваності</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; display: flex; justify-content: center; }
    
    .container { 
      background: white; 
      padding: 30px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
      width: 100%; 
      max-width: 1000px; 
    }

    h1 { text-align: center; color: #1e293b; margin-bottom: 5px; font-weight: 800; font-size: 24px; }
    .status { text-align: center; font-size: 12px; color: #94a3b8; margin-bottom: 20px; }

    /* Контейнер для адаптивності */
    .table-wrapper {
      width: 100%;
      overflow-x: auto; /* Додає горизонтальну прокрутку на малих екранах */
      -webkit-overflow-scrolling: touch;
      border-radius: 12px;
    }

    table { 
      width: 100%; 
      border-collapse: collapse; 
      min-width: 600px; /* Гарантує, що стовпчики не стиснуться в кашу на телефоні */
    }

    th { background: #6366f1; color: white; padding: 15px; text-align: left; font-size: 14px; white-space: nowrap; }
    td { padding: 14px 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; white-space: nowrap; }
    
    /* Перша колонка (Ім'я) фіксована для зручності (опціонально) */
    td:first-child, th:first-child {
      font-weight: 600;
      color: #1e293b;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover { background: #f8fafc; }

    .pos { color: #10b981; font-weight: 700; background: #ecfdf5; padding: 4px 10px; border-radius: 8px; display: inline-block; min-width: 25px; text-align: center; }
    .neg { color: #ef4444; font-weight: 700; background: #fef2f2; padding: 4px 10px; border-radius: 8px; display: inline-block; min-width: 25px; text-align: center; }

    /* Адаптація під мобільні пристрої */
    @media (max-width: 600px) {
      body { padding: 10px; }
      .container { padding: 15px; border-radius: 12px; }
      h1 { font-size: 20px; }
      th, td { padding: 10px 8px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>📊 Відвідуваність учнів</h1>
    <div id="updateTime" class="status">Синхронізація з сервером...</div>
    
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Учень</th>
            <th>Прогр.</th>
            <th>Робот.</th>
            <th>Малюв.</th>
            <th>Хіп-хоп</th>
            <th>Англ.</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>

<script>
const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXuEirbPdZ_qBQKpmktbVO_TBvc33hCbiYf3oen1ceR2zj-vnHUetel791wpWRtPlQIGxgykuBsypf/pub?gid=1247776630&single=true&output=csv';

async function fetchData() {
  try {
    const response = await fetch(
      url + '&t=' + Date.now(),
      { cache: "no-store" }
    );

    const csv = await response.text();

    const rows = csv.split('\n').map(r =>
      r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
       .map(c => c.replace(/^"|"$/g, '').trim())
    );

    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    const getBadge = (val) => {
        const num = parseInt(val) || 0;
        const cls = num < 0 ? 'neg' : 'pos';
        const displayVal = (val === undefined || val === "") ? "0" : val;
        return `<span class="${cls}">${displayVal}</span>`;
    };

    for (let i = 2; i < rows.length; i++) {
      const name = rows[i][0];  
      
      if (name && name.length > 1) {
        const pVal = rows[i][9];
        const rVal = rows[i][10];
        const mVal = rows[i][11];
        const hVal = rows[i][12];
        const aVal = rows[i][13];

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${name}</td>
          <td>${getBadge(pVal)}</td>
          <td>${getBadge(rVal)}</td>
          <td>${getBadge(mVal)}</td>
          <td>${getBadge(hVal)}</td>
          <td>${getBadge(aVal)}</td>
        `;

        tbody.appendChild(tr);
      }
    }

    document.getElementById('updateTime').innerText =
      'Останнє оновлення: ' + new Date().toLocaleTimeString();

  } catch (e) {
    document.getElementById('updateTime').innerText = "Помилка оновлення";
    console.error(e);
  }
}

fetchData();
// Можна розкоментувати, якщо хочете оновлення щохвилини
// setInterval(fetchData, 60000);
</script>

</body>
</html>
